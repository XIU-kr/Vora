services:
  vora:
    image: vora:local
    gpus: all
    ports:
      - "18743:18743"
    environment:
      - VORA_DEVICE=auto
      - VORA_PYTHON=/opt/venv-lama/bin/python
      - VORA_WORKER_TIMEOUT_MS=600000
      - VORA_BOOT_TIMEOUT_MS=120000
    volumes:
      - vora_torch_cache:/root/.cache/torch
      - vora_lama_cache:/root/.cache/lama

volumes:
  vora_torch_cache:
  vora_lama_cache:
