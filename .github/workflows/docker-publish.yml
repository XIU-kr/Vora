name: Docker Publish (Docker Hub)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Missing DOCKERHUB username. Set vars.DOCKERHUB_USERNAME or secrets.DOCKERHUB_USERNAME."
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Missing DOCKERHUB token. Set secrets.DOCKERHUB_TOKEN."
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            name=docker.io/xiukr/vora
          tags: |
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: |
            type=registry,ref=docker.io/xiukr/vora:cache-web-build
            type=registry,ref=docker.io/xiukr/vora:cache-server-build
            type=registry,ref=docker.io/xiukr/vora:cache-runtime
          cache-to: |
            type=registry,ref=docker.io/xiukr/vora:cache-web-build,mode=max,ignore-error=true
            type=registry,ref=docker.io/xiukr/vora:cache-server-build,mode=max,ignore-error=true
            type=registry,ref=docker.io/xiukr/vora:cache-runtime,mode=max,ignore-error=true
